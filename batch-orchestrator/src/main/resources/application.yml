server:
  port: 8083

spring:
  application:
    name: batch-orchestrator

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:billing_db}?rewriteBatchedInserts=true&prepareThreshold=0
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: BatchOrchestratorHikariCP
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false

  batch:
    jdbc:
      initialize-schema: always # Automatically creates Spring Batch metadata tables on startup
    job:
      enabled: false           # Disable running job on startup

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    template:
      default-topic: billing-execution-topic
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        retries: 2147483647
        max.in.flight.requests.per.connection: 1

  threads:
    virtual:
      enabled: true
