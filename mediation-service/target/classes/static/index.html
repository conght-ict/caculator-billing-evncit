        async function runBenchmarkLoadTest() {
            const mode = document.getElementById('benchMode').value;
            const iterations = document.getElementById('benchIterations').value;
            const threads = document.getElementById('benchThreads').value;
            
            const btn = document.getElementById('btnStartBench');
            const statusCard = document.getElementById('benchStatusCard');
            const consoleEl = document.getElementById('benchConsole');
            const reportCard = document.getElementById('benchReportCard');
            
            btn.disabled = true;
            statusCard.style.display = 'block';
            reportCard.style.display = 'none';
            
            consoleEl.innerHTML = `
                <div class="console-line">
                    <span class="console-ts">[INFO]</span>
                    <span class="console-tag">[system]</span>
                    <span class="console-text">Chuản bị kiểm thử SHBT quy mô ${Number(iterations).toLocaleString('vi-VN')} khách hàng...</span>
                </div>
                <div class="console-line">
                    <span class="console-ts">[INFO]</span>
                    <span class="console-tag">[system]</span>
                    <span class="console-text">Cấu hình: ${threads} Luồng tính toán song song...</span>
                </div>
                <div class="console-line">
                    <span class="console-ts">[INFO]</span>
                    <span class="console-tag">[system]</span>
                    <span class="console-text">Đang gửi REST Request tới phân hệ và kích hoạt luồng...</span>
                </div>
            `;

            if (mode === 'pipeline') {
                consoleEl.innerHTML += `
                    <div class="console-line">
                        <span class="console-ts">[INFO]</span>
                        <span class="console-tag">[database]</span>
                        <span class="console-text">Đang ghi dữ liệu chỉ số đo xa giả lập vào PostgreSQL (JDBC Batch)...</span>
                    </div>
                `;
            } else if (mode === 'kafka') {
                consoleEl.innerHTML += `
                    <div class="console-line">
                        <span class="console-ts">[INFO]</span>
                        <span class="console-tag">[kafka]</span>
                        <span class="console-text">Đang sản xuất (Publish) và đẩy sự kiện chỉ số thô vào Kafka Topic 'meter-readings-input'...</span>
                    </div>
                `;
            }
            consoleEl.scrollTop = consoleEl.scrollHeight;
            
            const month = document.getElementById('benchMonth').value;
            const startBenchTime = Date.now();
            try {
                let url = `/api/v1/monitoring/simulate/benchmark?iterations=${iterations}&threads=${threads}`;
                if (mode === 'pipeline') {
                    url = `/api/v1/monitoring/simulate/benchmark-pipeline?size=${iterations}&threads=${threads}&writeToDb=true&month=${month}`;
                } else if (mode === 'kafka') {
                    url = `/api/v1/monitoring/simulate/benchmark-kafka?size=${iterations}&threads=${threads}&month=${month}`;
                }
                
                const response = await fetch(url);
                const elapsedSeconds = (Date.now() - startBenchTime) / 1000.0;
                
                if (response.ok) {
                    let scale = Number(iterations);
                    let finalThroughput = 0;
                    let finalDuration = elapsedSeconds;
                    
                    if (mode === 'kafka') {
                        const text = await response.text();
                        consoleEl.innerHTML += `
                            <div class="console-line">
                                <span class="console-ts">[SUCCESS]</span>
                                <span class="console-tag">[kafka]</span>
                                <span class="console-text success">${text}</span>
                            </div>
                            <div class="console-line">
                                <span class="console-ts">[INFO]</span>
                                <span class="console-tag">[load-test]</span>
                                <span id="polling-status" class="console-text">Đang đo đạc tiến trình tính cước ngầm của Backend...</span>
                            </div>
                        `;
                        consoleEl.scrollTop = consoleEl.scrollHeight;

                        // Start polling the count of generated invoices
                        const targetCount = scale;
                        const pollStartTime = Date.now();
                        let lastCount = 0;
                        let idleSeconds = 0;

                        while (true) {
                            // Wait 500ms
                            await new Promise(resolve => setTimeout(resolve, 500));

                            const progressResponse = await fetch('/api/v1/monitoring/simulate/benchmark-progress');
                            if (!progressResponse.ok) continue;

                            const progressData = await progressResponse.json();
                            const currentCount = progressData.processed_invoices;
                            const elapsed = (Date.now() - pollStartTime) / 1000.0;
                            const tput = elapsed > 0 ? Math.round(currentCount / elapsed) : 0;

                            const percent = ((currentCount / targetCount) * 100).toFixed(1);
                            
                            const statusText = `Tiến trình: ${currentCount.toLocaleString('vi-VN')} / ${targetCount.toLocaleString('vi-VN')} hóa đơn (${percent}%) - Tốc độ hiện thời: ${tput.toLocaleString('vi-VN')} hóa đơn/s`;
                            document.getElementById('polling-status').innerText = statusText;

                            // Update live progress bar or display stats on card
                            document.getElementById('resTotal').innerText = currentCount.toLocaleString('vi-VN');
                            document.getElementById('resTime').innerText = elapsed.toFixed(2) + ' giây';
                            document.getElementById('resThroughput').innerText = tput.toLocaleString('vi-VN') + ' /s';
                            
                            const avgE2e = progressData.avg_e2e_ms != null ? progressData.avg_e2e_ms : 0.0;
                            const avgIngest = progressData.avg_ingest_ms != null ? progressData.avg_ingest_ms : 0.0;
                            const avgQueue = progressData.avg_queue_ms != null ? progressData.avg_queue_ms : 0.0;
                            const avgCalc = progressData.avg_calc_ms != null ? progressData.avg_calc_ms : 0.0;
                            const p95 = progressData.p95_e2e_ms != null ? progressData.p95_e2e_ms : 0.0;
                            const p99 = progressData.p99_e2e_ms != null ? progressData.p99_e2e_ms : 0.0;

                            document.getElementById('resLatency').innerText = currentCount > 0 ? (avgE2e > 0 ? avgE2e.toFixed(2) + ' ms' : ((elapsed / currentCount) * 1000).toFixed(2) + ' ms') : '0.00 ms';
                            document.getElementById('resStageIngest').innerText = avgIngest.toFixed(2) + ' ms';
                            document.getElementById('resStageQueue').innerText = avgQueue.toFixed(2) + ' ms';
                            document.getElementById('resStageCalc').innerText = avgCalc.toFixed(2) + ' ms';
                            document.getElementById('resP95').innerText = p95.toFixed(2) + ' ms';
                            document.getElementById('resP99').innerText = p99.toFixed(2) + ' ms';

                            if (currentCount >= targetCount) {
                                consoleEl.innerHTML += `
                                    <div class="console-line">
                                        <span class="console-ts">[SUCCESS]</span>
                                        <span class="console-tag">[load-test]</span>
                                        <span class="console-text success">Hoàn thành tính toán và lưu trữ tất cả ${targetCount.toLocaleString('vi-VN')} hóa đơn!</span>
                                    </div>
                                `;
                                break;
                            }

                            // If progress has stopped for too long (e.g. 5 seconds of no change, and we have processed something)
                            if (currentCount === lastCount && currentCount > 0) {
                                idleSeconds += 0.5;
                                if (idleSeconds >= 10) { // 10 seconds of no progress
                                    consoleEl.innerHTML += `
                                        <div class="console-line">
                                            <span class="console-ts">[WARNING]</span>
                                            <span class="console-tag">[load-test]</span>
                                            <span class="console-text warning">Tiến trình dừng lại tại ${currentCount.toLocaleString('vi-VN')} hóa đơn. Kết thúc đo đạc.</span>
                                        </div>
                                    `;
                                    break;
                                }
                            } else {
                                idleSeconds = 0;
                            }
                            lastCount = currentCount;
                        }

                        const finalElapsed = (Date.now() - pollStartTime) / 1000.0;
                        finalDuration = finalElapsed;
                        finalThroughput = Math.round(lastCount / finalDuration);
                        scale = lastCount;
                    } else {
                        const data = await response.json();
                        finalDuration = data.duration_seconds || data.total_benchmark_time_seconds || elapsedSeconds;
                        finalThroughput = data.throughput_per_second || Math.round(scale / finalDuration);
                        scale = data.total_calculations || data.scale_size || scale;
                    }
                    
                    consoleEl.innerHTML += `
                        <div class="console-line">
                            <span class="console-ts">[SUCCESS]</span>
                            <span class="console-tag">[load-test]</span>
                            <span class="console-text success">Kiểm thử thành công! Tổng thời gian chạy: ${finalDuration.toFixed(4)}s.</span>
                        </div>
                    `;
                    if (mode === 'pipeline') {
                        consoleEl.innerHTML += `
                            <div class="console-line">
                                <span class="console-ts">[INFO]</span>
                                <span class="console-tag">[database]</span>
                                <span class="console-text">Đã ghi hóa đơn thành công và dọn sạch dữ liệu mô phỏng.</span>
                            </div>
                        `;
                    }
                    consoleEl.scrollTop = consoleEl.scrollHeight;

                    // Display metrics
                    document.getElementById('resTotal').innerText = scale.toLocaleString('vi-VN');
                    document.getElementById('resTime').innerText = finalDuration.toFixed(4) + ' giây';
                    document.getElementById('resThroughput').innerText = finalThroughput.toLocaleString('vi-VN') + ' /s';
                    
                    const avgLatency = (finalDuration * 1000) / scale;
                    document.getElementById('resLatency').innerText = avgLatency.toFixed(4) + ' ms';
                    
                    // Display comparison bar
                    const factor = finalThroughput / 2000;
                    document.getElementById('resCompareText').innerText = `${finalThroughput.toLocaleString('vi-VN')} hóa đơn / giây (Tăng trưởng gấp ${Math.round(factor).toLocaleString('vi-VN')} lần!) 🚀`;
                    
                    reportCard.style.display = 'block';
                } else {
                    consoleEl.innerHTML += `
                        <div class="console-line">
                            <span class="console-ts">[ERROR]</span>
                            <span class="console-tag">[load-test]</span>
                            <span class="console-text error">Kiểm thử thất bại. Mã phản hồi: ${response.status}</span>
                        </div>
                    `;
                }
            } catch (err) {
                consoleEl.innerHTML += `
                    <div class="console-line">
                        <span class="console-ts">[ERROR]</span>
                        <span class="console-tag">[load-test]</span>
                        <span class="console-text error">Lỗi ngoại lệ: ${err.message}</span>
                    </div>
                `;
            } finally {
                btn.disabled = false;
            }
        }

        // Change cycle month
        function changeMonth(newMonth) {
            activeMonth = newMonth;
            loadTracerDetails(activeAccountId, newMonth);
        }
    </script>
